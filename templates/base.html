<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RestaurantOS — Módulo Mesero{% endblock %}</title>
  <meta name="description" content="{% block meta_description %}Sistema de gestión para restaurantes{% endblock %}" />

  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Google Fonts: Inter -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ─── Variables & reset ──────────────────────────────────────────────── */
    :root {
      --color-bg:        #0f1117;
      --color-surface:   #1a1d27;
      --color-surface2:  #22263a;
      --color-border:    #2e3250;
      --color-accent:    #7c6ef5;
      --color-accent2:   #5b9cf6;
      --color-text:      #e2e8f0;
      --color-muted:     #8892b0;
      --color-libre:     #10b981;
      --color-ocupada:   #ef4444;
      --color-reservada: #f59e0b;
      --sidebar-w:       340px;
      --navbar-h:        60px;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
    }

    /* ─── Navbar ─────────────────────────────────────────────────────────── */
    .navbar-restaurant {
      height: var(--navbar-h);
      background: var(--color-surface);
      border-bottom: 1px solid var(--color-border);
      backdrop-filter: blur(12px);
    }
    .navbar-brand-text {
      font-weight: 700;
      font-size: 1.15rem;
      background: linear-gradient(135deg, var(--color-accent), var(--color-accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .nav-pill-link {
      color: var(--color-muted);
      text-decoration: none;
      padding: .35rem .85rem;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: 500;
      transition: all .2s;
    }
    .nav-pill-link:hover, .nav-pill-link.active {
      background: var(--color-surface2);
      color: var(--color-text);
    }
    .nav-pill-link i { margin-right: .3rem; }

    /* ─── Cards genéricas ────────────────────────────────────────────────── */
    .card-dark {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: 14px;
      transition: border-color .2s, transform .15s;
    }
    .card-dark:hover {
      border-color: var(--color-accent);
      transform: translateY(-1px);
    }

    /* ─── Scrollbar personalizado ─────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--color-surface); }
    ::-webkit-scrollbar-thumb { background: var(--color-border); border-radius: 6px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-accent); }

    /* ─── Badges de estado mesa ──────────────────────────────────────────── */
    .badge-libre     { background: rgba(16,185,129,.15); color: var(--color-libre); border: 1px solid rgba(16,185,129,.3); }
    .badge-ocupada   { background: rgba(239,68,68,.15);  color: var(--color-ocupada); border: 1px solid rgba(239,68,68,.3); }
    .badge-reservada { background: rgba(245,158,11,.15); color: var(--color-reservada); border: 1px solid rgba(245,158,11,.3); }

    /* ─── Botón primary custom ───────────────────────────────────────────── */
    .btn-accent {
      background: linear-gradient(135deg, var(--color-accent), var(--color-accent2));
      border: none;
      color: #fff;
      font-weight: 600;
      letter-spacing: .02em;
      transition: opacity .2s, transform .15s;
    }
    .btn-accent:hover { opacity: .88; color: #fff; transform: translateY(-1px); }
    .btn-accent:active { transform: translateY(0); }

    /* ─── Modales oscuros ────────────────────────────────────────────────── */
    .modal-content {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      color: var(--color-text);
    }
    .modal-header, .modal-footer {
      border-color: var(--color-border);
    }

    /* ─── Inputs / Selects ───────────────────────────────────────────────── */
    .form-control-dark, .form-select-dark {
      background: var(--color-surface2);
      border: 1px solid var(--color-border);
      color: var(--color-text);
      border-radius: 10px;
    }
    .form-control-dark:focus, .form-select-dark:focus {
      background: var(--color-surface2);
      border-color: var(--color-accent);
      color: var(--color-text);
      box-shadow: 0 0 0 3px rgba(124,110,245,.2);
    }
    .form-control-dark::placeholder { color: var(--color-muted); }

    /* ─── [x-cloak] ocultar antes de Alpine ─────────────────────────────── */
    [x-cloak] { display: none !important; }

    {% block extra_css %}{% endblock %}
  </style>
</head>
<body>

<!-- ═══════════════════════════  NAVBAR  ════════════════════════════════════ -->
<nav class="navbar navbar-restaurant px-4 d-flex align-items-center justify-content-between sticky-top">
  <a class="navbar-brand-text text-decoration-none" href="/mesero/mesas/">
    <i class="bi bi-fork-knife me-2"></i>RestaurantOS
  </a>
  <div class="d-flex gap-2">
    <a href="/mesero/mesas/"          class="nav-pill-link {% block nav_mesas %}{% endblock %}">
      <i class="bi bi-grid-3x3-gap"></i> Plano
    </a>
    <a href="/mesero/nueva-comanda/"  class="nav-pill-link {% block nav_comanda %}{% endblock %}">
      <i class="bi bi-plus-circle"></i> Nueva Comanda
    </a>
    {% if user.is_authenticated %}
    <span class="nav-pill-link"><i class="bi bi-person-circle"></i> {{ user.get_short_name|default:user.username }}</span>
    {% endif %}
  </div>
</nav>
<!-- ═══════════════════════════════════════════════════════════════════════════ -->

<main class="{% block main_class %}container-fluid py-4{% endblock %}">
  {% block content %}{% endblock %}
</main>

<!-- Bootstrap 5 JS (Bundle con Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Alpine.js v3 (defer) -->
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
