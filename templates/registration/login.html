<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Iniciar Sesión — RestaurantOS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      background: #0f1117; color: #e2e8f0;
      font-family: 'Inter', sans-serif;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card {
      background: #1a1d27; border: 1px solid #2e3250;
      border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,.5);
    }
    .logo-text {
      font-weight: 800; font-size: 1.6rem;
      background: linear-gradient(135deg, #7c6ef5, #5b9cf6);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .form-control {
      background: #22263a; border: 1px solid #2e3250; color: #e2e8f0;
      border-radius: 10px; padding: .75rem 1rem;
    }
    .form-control:focus {
      background: #22263a; border-color: #7c6ef5; color: #e2e8f0;
      box-shadow: 0 0 0 3px rgba(124,110,245,.2);
    }
    .form-control::placeholder { color: #8892b0; }
    .btn-login {
      background: linear-gradient(135deg, #7c6ef5, #5b9cf6);
      border: none; color: #fff; font-weight: 600; border-radius: 10px;
      padding: .75rem; font-size: 1rem; transition: opacity .2s;
    }
    .btn-login:hover { opacity: .85; color: #fff; }
    label { color: #8892b0; font-size: .85rem; margin-bottom: .4rem; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="logo-text"><i class="bi bi-fork-knife me-2"></i>RestaurantOS</div>
      <p class="text-muted mt-1 mb-0" style="font-size:.9rem;">Módulo Mesero</p>
    </div>

    {% if form.errors %}
    <div class="alert alert-danger py-2 px-3 mb-3" style="border-radius:10px;font-size:.87rem;">
      <i class="bi bi-exclamation-triangle me-1"></i>
      Usuario o contraseña incorrectos.
    </div>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <div class="mb-3">
        <label for="id_username">Usuario</label>
        <input type="text" name="username" id="id_username"
               class="form-control" placeholder="admin" autofocus required/>
      </div>
      <div class="mb-4">
        <label for="id_password">Contraseña</label>
        <input type="password" name="password" id="id_password"
               class="form-control" placeholder="••••••••" required/>
      </div>
      <button type="submit" class="btn btn-login w-100">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
      <input type="hidden" name="next" value="{{ next }}"/>
    </form>

    <p class="text-center text-muted mt-3 mb-0" style="font-size:.8rem;">
      Admin: <strong>admin</strong> / <strong>admin123</strong>
    </p>
  </div>
</body>
</html>
